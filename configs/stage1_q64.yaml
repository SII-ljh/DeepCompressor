qwen:
  model_name_or_path: "Qwen/Qwen3-0.6B"
  hidden_size: 1024
  num_hidden_layers: 28
  vocab_size: 151936
  max_doc_tokens: 512
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  perceiver_dim: 1024
  num_queries: 64
  num_heads: 16
  head_dim: 64
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 2000
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 1.0
  hidden_mse_weight: 1.0

training:
  stage: 1
  learning_rate: 1.0e-4
  batch_size: 8
  gradient_accumulation_steps: 2
  max_steps: 50000
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  output_dir: outputs/stage1_q64
  ntp_segment_len: 256
  log_every: 50
  eval_every: 500
  save_every: 1000
  gradient_checkpointing: false
  mixed_precision: "no"

# ── runtime (used by Hydra entry, ignored by from_yaml) ──
data_path: ???
eval_data_path: null
resume_from: null
max_eval_samples: 0
max_train_samples: 0

wandb:
  enabled: true
  project: deep-compressor
  entity: null
  run_name: stage1_q64
  tags: ["stage1", "q64"]
  offline: false
