qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  hidden_size: 1024
  num_hidden_layers: 28
  vocab_size: 151936
  max_doc_tokens: 512
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  perceiver_dim: 1024
  num_queries: 128
  num_heads: 16
  head_dim: 64
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 2000
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 1.0
  hidden_mse_weight: 1.0

training:
  stage: 1
  learning_rate: 1.0e-4
  batch_size: 8
  gradient_accumulation_steps: 2
  max_steps: 200000
  warmup_steps: 2000
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  output_dir: outputs/stage1_guided_q128
  ntp_segment_len: 256
  log_every: 50
  eval_every: 1000
  save_every: 5000
  gradient_checkpointing: false
  mixed_precision: "no"

ablation:
  down_proj_mode: identity
  up_proj_mode: identity
  query_condition_on_question: true
  ntp_use_questions: true  # Enable question-guided compression
  enable_stage_a: true
  enable_stage_b: true
  enable_stage_c: true
  override_stage_a_cross_layers: 0
  override_stage_a_self_layers: 0
  override_stage_b_layers: 0
  override_stage_c_cross_layers: 0
  override_stage_c_self_layers: 0
  enable_kl_distillation: true
  enable_hidden_mse_distillation: true
  override_num_queries: 0

# ── runtime (used by Hydra entry, ignored by from_yaml) ──
data_path: ???
eval_data_path: null
resume_from: null
max_eval_samples: 0
max_train_samples: 0

wandb:
  enabled: true
  project: deep-compressor-refactor
  entity: null
  run_name: stage1_guided_q128
  tags: ["stage1", "guided", "q128"]
  offline: false
