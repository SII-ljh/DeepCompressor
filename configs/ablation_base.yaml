# Ablation experiment base config
# Short sequences + fast iterations for ablation comparisons
# Ablation overrides are applied programmatically by scripts/ablation.py

qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  hidden_size: 1024
  num_hidden_layers: 28
  vocab_size: 151936
  max_doc_tokens: 512          # short docs for fast ablation
  max_question_tokens: 64
  max_answer_tokens: 64

finbert:
  enabled: false

perceiver:
  perceiver_dim: 1024
  num_queries: 64
  num_heads: 16
  head_dim: 64
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  anchor_score_scale_init: 1.0
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 200
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 1.0
  hidden_mse_weight: 1.0
  anchor_recon_weight: 0.5

training:
  stage: 1
  learning_rate: 5.0e-4
  batch_size: 1
  gradient_accumulation_steps: 4
  max_steps: 500              # short runs for ablation
  warmup_steps: 50
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 25
  eval_every: 100
  save_every: 500
  output_dir: outputs/ablation
  ntp_segment_len: 64
  gradient_checkpointing: true
  mixed_precision: "no"

# Ablation config — all defaults (overridden by scripts/ablation.py)
ablation:
  down_proj_mode: identity
  up_proj_mode: identity
  query_condition_on_question: true
  enable_stage_a: true
  enable_stage_b: true
  enable_stage_c: true
  override_stage_a_cross_layers: 0
  override_stage_a_self_layers: 0
  override_stage_b_layers: 0
  override_stage_c_cross_layers: 0
  override_stage_c_self_layers: 0
  enable_kl_distillation: true
  enable_hidden_mse_distillation: true
  override_num_queries: 0

# runtime
data_path: ???
eval_data_path: null
resume_from: null
max_eval_samples: 0
max_train_samples: 0

wandb:
  enabled: false
  project: dc-ablation
  entity: null
  run_name: null
  tags: []
  offline: false
