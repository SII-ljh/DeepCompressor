# ── Stage 2a: QA Fine-tuning on SHORT documents (< 512 tokens) ──
#
# Strategy: Gradually adapt from Stage 1 (trained on 512 tokens) to longer docs
#   - Stage 2a: Train on short QA samples (< 512 tokens) for 5K steps
#   - Stage 2b: Then extend to 2048 tokens for full QA dataset
#
# This avoids the distribution shift shock from 512 → 2048 directly.
#
# Effective batch size: 8 GPU × 8 batch × 2 acc = 128
# Short QA samples (~48% of 263K): ~126K samples
# 5K steps × 128 = 640K samples (~5 epochs over short subset)

qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  max_doc_tokens: 512
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  num_queries: 64
  num_heads: 16
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 1000
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 0.5
  hidden_mse_weight: 0.1

training:
  learning_rate: 5.0e-5
  batch_size: 8
  gradient_accumulation_steps: 2
  max_steps: 5000
  warmup_steps: 200
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 20
  eval_every: 500
  save_every: 1000
  output_dir: outputs/h200_stage2a
  gradient_checkpointing: true
  mixed_precision: "bf16"

wandb:
  enabled: true
  project: deep-compressor
  run_name: "stage2a-8xH200-0.6B-qa-short"
  tags: ["stage2a", "8xH200", "0.6B", "qa", "short-docs"]
