# ── Stage 2b: QA Fine-tuning on LONG documents (up to 2048 tokens) ──
#
# Prerequisites: Stage 2a checkpoint at outputs/h200_stage2a/checkpoint-final/
#
# Strategy: After adapting to short docs in Stage 2a, now train on full QA dataset
# with extended max_doc_tokens=2048 (covers 62% of QA data).
#
# Effective batch size: 8 GPU × 4 batch × 2 acc = 64 (smaller due to longer docs)
# Full QA samples: 263K
# 10K steps × 64 = 640K samples (~2.4 epochs)

qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  max_doc_tokens: 2048        # Extended from 512
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  num_queries: 64
  num_heads: 16
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 1000
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 0.5
  hidden_mse_weight: 0.1

training:
  stage: 2
  learning_rate: 3.0e-5        # Slightly lower than 2a for stability
  batch_size: 4                # Reduced due to 2048 tokens (4× longer than 512)
  gradient_accumulation_steps: 2
  max_steps: 10000
  warmup_steps: 200
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 20
  eval_every: 500
  save_every: 1000
  output_dir: outputs/h200_stage2b
  ntp_segment_len: 256
  gradient_checkpointing: true
  mixed_precision: "bf16"

wandb:
  enabled: true
  project: deep-compressor
  run_name: "stage2b-8xH200-0.6B-qa-long"
  tags: ["stage2b", "8xH200", "0.6B", "qa", "long-docs"]
