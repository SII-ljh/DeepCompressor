# ── Stage 2b: QA Fine-tuning on MEDIUM documents (512-2048 tokens) ──
#
# Prerequisites: Stage 2a checkpoint at outputs/h200_stage2a/checkpoint-final/
#
# Strategy: After adapting to short docs (0-512), now train on medium-length docs
# (512-2048) to gradually extend the model's capability.
#
# Effective batch size: 8 GPU × 4 batch × 2 acc = 64
# Medium QA samples (512-2048 tokens): ~36K samples
# 3K steps × 64 = 192K samples (~5 epochs over 36K)

qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  max_doc_tokens: 2048
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  num_queries: 64
  num_heads: 16
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 500
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 0.5
  hidden_mse_weight: 0.1

training:
  learning_rate: 3.0e-5
  batch_size: 4
  gradient_accumulation_steps: 2
  max_steps: 3000
  warmup_steps: 150
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 20
  eval_every: 300
  save_every: 1000
  output_dir: outputs/h200_stage2b
  gradient_checkpointing: true
  mixed_precision: "bf16"

wandb:
  enabled: true
  project: deep-compressor
  run_name: "stage2b-8xH200-0.6B-qa-medium"
  tags: ["stage2b", "8xH200", "0.6B", "qa", "medium-docs", "512-2048"]
  group: "stage2-h200"
  notes: null
