qwen:
  model_name_or_path: models/Qwen3-0.6B
  max_doc_tokens: 4096
  max_question_tokens: 256
  max_answer_tokens: 512
perceiver:
  perceiver_dim: 1024
  num_heads: 16
  head_dim: 64
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1
  num_queries: 2048  # 压缩比 2:1
projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1
loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 2000
  hidden_distill_layers:
  - 7
  - 14
  - 21
  - 27
  qa_ce_weight: 1.0
  kl_weight: 0.0
  hidden_mse_weight: 0.0
training:
  learning_rate: 0.0001
  batch_size: 5  # Q再翻倍，从10降到5
  gradient_accumulation_steps: 4  # 增大accum补偿batch减小，effective=8*5*4=160
  max_steps: 9072
  warmup_steps: 454
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 50
  eval_every: 756
  save_every: 3024
  gradient_checkpointing: true  # Q=2048显存压力大，开启gradient checkpointing
  mixed_precision: bf16
  output_dir: outputs/qa_q2048_8gpu
ablation:
  down_proj_mode: identity
  up_proj_mode: identity
  query_condition_on_question: true
  enable_stage_a: true
  enable_stage_b: true
  enable_stage_c: true
  enable_kl_distillation: false
  enable_hidden_mse_distillation: false
  override_num_queries: 0
