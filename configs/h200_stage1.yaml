# ── Stage 1 NTP Pretraining: 8×H200, Qwen3-0.6B, full dataset ──
#
# Effective batch size: 8 GPU × 16 batch × 1 acc = 128
# Original config:     1 GPU × 4 batch × 4 acc = 16  (8× smaller)
# max_doc_tokens reduced to 512 (covers 82% samples, eliminates padding waste)
#
# LR scaled by sqrt(8) ≈ 2.8×: 1e-4 → 2.5e-4
# Max steps reduced proportionally: 50K → 8000  (same total samples seen)
#   Original: 50K × 16 = 800K samples
#   Now:      8K × 128 = 1.024M samples (~similar, slightly more)
#
# Warmup kept at ~4%: 300 steps

qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  max_doc_tokens: 512
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  num_queries: 64
  num_heads: 16
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.1

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.1

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 2000
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 1.0
  hidden_mse_weight: 1.0

training:
  stage: 1
  learning_rate: 2.5e-4
  batch_size: 16
  gradient_accumulation_steps: 1
  max_steps: 8000
  warmup_steps: 300
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 20
  eval_every: 500
  save_every: 1000
  output_dir: outputs/h200_stage1
  ntp_segment_len: 256
  gradient_checkpointing: true
  mixed_precision: "bf16"

wandb:
  enabled: true
  project: deep-compressor
  run_name: "stage1-8xH200-0.6B-full"
  tags: ["stage1", "8xH200", "0.6B", "production"]
