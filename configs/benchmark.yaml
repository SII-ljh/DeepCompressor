# Benchmark evaluation config
# Full-size model parameters for proper evaluation

qwen:
  model_name_or_path: "models/Qwen3-0.6B"
  hidden_size: 1024
  num_hidden_layers: 28
  vocab_size: 151936
  max_doc_tokens: 8192
  max_question_tokens: 256
  max_answer_tokens: 512

perceiver:
  perceiver_dim: 1024
  num_queries: 64
  num_heads: 16
  head_dim: 64
  stage_a_cross_layers: 2
  stage_a_self_layers: 2
  stage_b_layers: 2
  stage_c_cross_layers: 2
  stage_c_self_layers: 4
  ff_mult: 4
  dropout: 0.0               # no dropout in eval mode

projection:
  down_hidden: 768
  up_hidden: 768
  dropout: 0.0               # no dropout in eval mode

loss:
  kl_temperature: 2.0
  hidden_distill_ramp_steps: 2000
  hidden_distill_layers: [7, 14, 21, 27]
  qa_ce_weight: 1.0
  kl_weight: 1.0
  hidden_mse_weight: 1.0

training:
  stage: 2
  learning_rate: 1.0e-4
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 50000
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  scheduler: cosine
  seed: 42
  log_every: 50
  eval_every: 500
  save_every: 1000
  output_dir: outputs/benchmark
  ntp_segment_len: 256
  gradient_checkpointing: false
  mixed_precision: "no"

ablation:
  down_proj_mode: identity
  up_proj_mode: identity
  query_condition_on_question: true
  enable_stage_a: true
  enable_stage_b: true
  enable_stage_c: true
  override_stage_a_cross_layers: 0
  override_stage_a_self_layers: 0
  override_stage_b_layers: 0
  override_stage_c_cross_layers: 0
  override_stage_c_self_layers: 0
  enable_kl_distillation: true
  enable_hidden_mse_distillation: true
  override_num_queries: 0

# runtime
data_path: ???
eval_data_path: null
resume_from: null
max_eval_samples: 0
max_train_samples: 0

wandb:
  enabled: false
  project: dc-benchmark
  entity: null
  run_name: null
  tags: []
  offline: false
